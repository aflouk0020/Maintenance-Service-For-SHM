spring.application.name=maintenance-service
server.port=8083

# ======================
# DATABASE (H2 - DEV MODE)
# ======================
spring.datasource.url=jdbc:h2:mem:maintenancedb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ======================
# SERVICE URLS
# ======================
property.service.base-url=http://localhost:8082
user.service.base-url=http://localhost:8081
notification.service.base-url=http://localhost:8086
# ======================
# JWT
# ======================
app.jwt.secret=my-super-secure-jwt-secret-key-2026-smart-home-platform
app.jwt.expirySeconds=3600

# ======================
# EUREKA
# ======================
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ======================
# ACTUATOR
# ======================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true